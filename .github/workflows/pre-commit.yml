name: Pre-commit & Notebook Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit-check:
    name: pre-commit & notebook checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit nbqa black ruff nbformat isort

      # Run pre-commit checks (runs each hook in check mode where applicable)
      - name: Run pre-commit (all files)
        run: |
          # show diffs on failure to make it easier to see required fixes
          pre-commit run --all-files --show-diff-on-failure

      # Extra notebook-aware checks (recommended)
      - name: Check notebooks are formatted (nbqa + black in check mode)
        run: |
          # nbqa black supports --check to only verify formatting
          nbqa black --check --diff --line-length=79 .

      - name: Check notebooks import sorting (nbqa + isort in check mode)
        run: |
          nbqa isort --check --diff --profile=black --line-length=79 .

      - name: Run ruff checks
        run: |
          ruff check .

      - name: Fail if any notebooks contain outputs
        run: |
          python - <<'PY'
          import sys, pathlib, nbformat
          errors = []
          for p in pathlib.Path('.').rglob('*.ipynb'):
              # Skip .ipynb_checkpoints
              if '.ipynb_checkpoints' in str(p):
                  continue
              try:
                  nb = nbformat.read(p, as_version=4)
              except Exception as e:
                  errors.append(f"Failed to read {p}: {e}")
                  continue
              for i, cell in enumerate(nb.cells):
                  if cell.get('outputs'):
                      errors.append(f"{p}: cell[{i}] has outputs")
                  if cell.get('execution_count'):
                      errors.append(f"{p}: cell[{i}] has execution_count")
          if errors:
              print("Notebook output checks failed:\n" + "\n".join(errors))
              sys.exit(1)
          print("No notebook outputs found.")
          PY
