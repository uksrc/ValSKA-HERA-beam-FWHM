name: ValSKA CI/CD Pipeline

on: [push]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        $CONDA/bin/conda env update --file valska_env.yaml  --prune --name base
        $CONDA/bin/conda activate base
    - name: Test with pytest
      run: |
        make python-test
    - name: Test notebooks
      run: |
        make notebook-test
