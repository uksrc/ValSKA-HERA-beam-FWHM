name: ValSKA CI/CD Pipeline

on: [push]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    # conda-incubator requires the bash shell in login mode
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - uses: actions/checkout@v5
    - name: Install dependencies
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: valska
        environment-file: valska_env.yaml
        # We do not need the base environment to be activated as well
        auto-activate: true
    - name: Test with pytest
      run: |
        make python-test
    - name: Test notebooks
      run: |
        make notebook-test
