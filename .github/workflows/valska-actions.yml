name: ValSKA CI/CD Pipeline

on: 
  pull_request

permissions:
  contents: read

defaults:
  run:
    shell: bash -l {0}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: ./.github/actions/setup-conda
    - name: Pre-commit
      run: pre-commit run --all-files
    - name: Upload Lint Results
      if: always() # Ensures reports upload even if linting fails
      uses: actions/upload-artifact@v4
      with:
        name: lint-reports
        path: build/reports/*.xml  

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v5
    - uses: ./.github/actions/setup-conda
    - name: Test with pytest
      run: |
        make python-test
    - name: Test notebooks
      run: |
        make notebook-test

  docs:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v5
    - uses: ./.github/actions/setup-conda
    - name: Build docs
      run: |
        sphinx-build -W -b html docs/source/ docs/_build/html