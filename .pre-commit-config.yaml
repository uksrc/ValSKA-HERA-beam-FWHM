# Pre-commit hooks configuration for ValSKA
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: local
    hooks:
      - id: python-format
        name: python format (make target)
        entry: make python-format
        language: python
        additional_dependencies:
          - ruff>=0.12.0
        pass_filenames: false
        verbose: true

      - id: python-lint
        name: python lint (make target)
        entry: make python-lint
        language: python
        additional_dependencies:
          - ruff>=0.12.0
          - mypy
          - types-PyYAML
        pass_filenames: false
        verbose: true

      - id: notebook-format
        name: notebook format (make target)
        entry: make notebook-format
        language: python
        additional_dependencies:
          - ruff>=0.12.0
        pass_filenames: false
        verbose: true

      - id: notebook-lint
        name: notebook lint (make target)
        entry: make notebook-lint
        language: python
        additional_dependencies:
          - ruff>=0.12.0
          - mypy
          - nbqa
          - types-PyYAML
        pass_filenames: false
        verbose: true