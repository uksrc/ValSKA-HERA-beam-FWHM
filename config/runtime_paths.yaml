# Site/user-specific runtime configuration for ValSKA.

# Where ValSKA should write all results (BayesEoR outputs, validation plots/tables, etc.)
results_root: /home/psims/share/validation_results/UKSRC/

# Default location for input datasets.
# If a CLI argument like --data is given as a *relative* path, ValSKA will resolve it as:
#   <data.root>/<relative-path>
# Absolute paths are used as-is.
data:
  root:  ~/share/test/Updated_BayesEoR_Nov2025/BayesEoR//UKSRC_val_mock_vis/initial_data_set_from_Quentin/pyuvsims_29102025/vis/

bayeseor:
  # Path to a local clone of BayesEoR used to locate scripts/run-analysis.py
  repo_path: /home/psims/share/test/Updated_BayesEoR_Nov2025/BayesEoR

  # Conda settings used inside SLURM scripts (non-interactive shells)
  conda_sh: "source /home/psims/share/miniconda3/etc/profile.d/conda.sh"
  conda_env: bayeseor_test2

  # Default shipped template to use if --template is not provided
  # default_template: validation_v1d0_template.yaml
  default_template: validation_achromatic_Gaussian.yaml

  # Whether to enforce unique output directories by default
  unique_by_default: false

  # Submission defaults (used by valska-bayeseor-submit)
  submit:
    sbatch_exe: sbatch
    record: jobs.json
    refuse_if_jobs_exist: true

  # Backwards-compatible single-profile defaults (fallback if cpu/gpu profiles not set)
  slurm_defaults:
    # partition: a100_gpu         # optional (omit on constraint-based sites)
    constraint: A100
    time: "1-00:00:00"
    mem: 64G
    cpus_per_task: 16
    job_name_prefix: "bayeseor"
    ntasks: 1
    nodes: 1
    ntasks_per_node: 1
    mpi: pmi2
    # extra_sbatch:
    #   - "--account=<account>"
    #   - "--qos=<qos>"

  # Preferred: stage-specific SLURM defaults
  slurm_defaults_cpu:
    # partition: cpu             # optional
    constraint: A100
    time: "1-11:00:00"
    mem: 64G
    cpus_per_task: 16
    job_name_prefix: "cpu_test1"
    ntasks: 1
    nodes: 1
    ntasks_per_node: 1
    mpi: pmi2

  slurm_defaults_gpu:
    # partition: a100_gpu        # optional
    constraint: A100
    time: "1-11:00:00"
    mem: 64G
    cpus_per_task: 8
    job_name_prefix: "gpu_test1"
    ntasks: 1
    nodes: 2
    ntasks_per_node: 2
    mpi: pmi2

  # Sweep configuration for valska-bayeseor-sweep
  sweep:
    fwhm_fracs: [-0.10, -0.05, -0.02, -0.01, 0.0, 0.01, 0.02, 0.05, 0.10]