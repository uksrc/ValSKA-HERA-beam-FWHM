# ---
# Quick usage:
# Editable install (dev): pip install -e .[dev]
# Standard install: pip install .
# ---
[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "valska-hera-beam-fwhm"
version = "0.1.0"
description = "Validation utilities for HERA beam FWHM sensitivity in 21-cm power-spectrum forward modelling."
readme = "README.md"
# requires-python = ">=3.10"
license = { file = "LICENSE" }

authors = [
  { name = "UKSRC Science Enabling - Science Validation Tooling" }
]

keywords = ["UKSRC", "validation", "Bayesian", "HERA", "21-cm", "power spectrum"]

classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: BSD License",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Astronomy"
]

# TODO: consider fixing to a specific versions for reproducibility
dependencies = [
    # "bayeseor@git+https://github.com/PSims/BayesEoR.git@main"
    "bayeseor@git+https://github.com/PSims/BayesEoR.git@restructure"
]

# Version is derived from your Git tags by setuptools-scm
# dynamic = ["version"]

[project.optional-dependencies]
dev = [
  "black>=25.12.0",
  "flake8>=7.3.0",
  "isort>=7.0.0",
  "pylint>=4.04",
  "pylint-junit>=0.3.5",
  "pytest>=9.0.2",
  "pytest-cov>=7.0.0",
  "pytest-mock>=3.15.1",
  "ruff>=0.14.11",
  "mypy>=1.19.1",
  "pre-commit>=4.5.1",
  "ipykernel>=7.1.0",
  "nbstripout>=0.8.2",
  "build>=1.4.0",
  "twine>=6.2.0",
  "nbmake>=1.5.5"
]
docs = [
  "mkdocs>=1.6.1",
  "mkdocs-material>=9.7.1"
]

[project.urls]
Homepage = "https://github.com/UKSRC/ValSKA-HERA-beam-FWHM"
Issues = "https://github.com/UKSRC/ValSKA-HERA-beam-FWHM/issues"

[project.scripts]
valska-beam-validate = "valska_hera_beam.cli:main"

[tool.isort]
profile = "black"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["tests*", "docs*", "notebooks*", "scripts*", "temp*"]

[tool.setuptools_scm]
write_to = "src/valska_hera_beam/_version.py"
fallback_version = "0.1.0"
