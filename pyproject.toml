# ---
# Quick usage:
# Editable install (dev): pip install -e .[dev]
# Standard install: pip install .
# ---
[build-system]
# setuptools-scm must be available at build time for dynamic versioning from Git tags
requires = ["setuptools>=68", "wheel", "setuptools-scm[toml]>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "valska-hera-beam-fwhm"
# Version is derived from your Git tags by setuptools-scm
dynamic = ["version"]
description = "Validation utilities for HERA beam FWHM sensitivity in 21-cm power-spectrum forward modelling."
readme = "README.md"
# requires-python = ">=3.10"
license = { file = "LICENSE" }

authors = [
  { name = "UKSRC Science Enabling - Science Validation Tooling" }
]

keywords = ["UKSRC", "validation", "Bayesian", "HERA", "21-cm", "power spectrum"]

classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: BSD License",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Astronomy"
]

# TODO: consider fixing to a specific versions for reproducibility
dependencies = [
    "astropy",
    "astropy-healpix",
    "h5py",
    "jsonargparse",
    "numpy",
    "pymultinest",
    "pyuvdata",
    "pyyaml",
    "rich",
    "ruamel.yaml",
    "scipy",
    "anesthetic",
    "tqdm",
    # "bayeseor@git+https://github.com/PSims/BayesEoR.git@main"
    "bayeseor@git+https://github.com/PSims/BayesEoR.git@restructure"
]

[project.optional-dependencies]
dev = [
  "black",
  "flake8",
  "isort",
  "pylint",
  "pylint-junit",
  "pytest",
  "pytest-cov",
  "pytest-mock",
  "ruff>=0.12.0",
  "mypy",
  "pre-commit",
  "ipykernel",
  "nbstripout",
  "build",
  "twine",
  "nbmake"
]
docs = [
  "mkdocs",
  "mkdocs-material"
]

[project.urls]
Homepage = "https://github.com/UKSRC/ValSKA-HERA-beam-FWHM"
Issues = "https://github.com/UKSRC/ValSKA-HERA-beam-FWHM/issues"

[project.scripts]
# valska-beam-validate = "valska_hera_beam.cli:main"
valska-beam-validate = "valska_hera_beam.cli.main:main"
valska-bayeseor-prepare = "valska_hera_beam.external_tools.bayeseor.cli_prepare:main"
valska-bayeseor-submit = "valska_hera_beam.external_tools.bayeseor.cli_submit:main"
valska-bayeseor-sweep = "valska_hera_beam.external_tools.bayeseor.cli_sweep:main"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

# Explicitly include non-Python package data (e.g. YAML configs) in built distributions.
# This is important even if you mainly install from source/editable, and helps wheel installs.
[tool.setuptools.package-data]
valska_hera_beam = [
  "config/*.yaml",
  "external_tools/bayeseor/templates/*.yaml",
]

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["tests*", "docs*", "notebooks*", "scripts*", "temp*"]

[tool.setuptools_scm]
write_to = "src/valska_hera_beam/_version.py"
fallback_version = "0.1.0"
